name: Deploy to Firebase Hosting

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target (hosting, firestore rules, or all)'
        required: true
        default: 'hosting'
        type: choice
        options:
          - hosting
          - firestore
          - all

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS="$(pwd)/sa-key.json"
          case "${{ github.event.inputs.target }}" in
            hosting)
              firebase deploy --only hosting --project margins-reading-app
              ;;
            firestore)
              firebase deploy --only firestore:rules --project margins-reading-app
              ;;
            all)
              firebase deploy --project margins-reading-app
              ;;
          esac
          rm -f sa-key.json
