<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Margins">
  <meta name="theme-color" content="#FAFAFA">
  <title>Margins</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Auth screen -->
  <div id="auth-screen" style="display:none">
    <div id="auth-form"></div>
  </div>

  <div id="app" style="display:none">
    <!-- Top bar -->
    <header id="top-bar">
      <h1 class="app-title">Margins</h1>
      <button id="settings-btn" aria-label="Settings">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <!-- Main content area -->
    <main id="main-content"></main>

    <!-- Bottom tab bar -->
    <nav id="tab-bar">
      <button class="tab-btn active" data-tab="today">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
        <span>Today</span>
      </button>
      <button class="tab-btn" data-tab="library">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
        </svg>
        <span>Library</span>
      </button>
      <button class="tab-btn" data-tab="practice">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
        </svg>
        <span>Practice</span>
      </button>
    </nav>

    <!-- Chat FAB -->
    <button id="chat-fab" aria-label="Chat">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
    </button>
  </div>

  <!-- Chat modal -->
  <div id="chat-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content modal-large chat-sheet">
      <div class="chat-header">
        <div class="chat-header-left">
          <svg class="chat-header-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2z"/></svg>
          <span>AI Assistant</span>
        </div>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="chat-popup-body"></div>
    </div>
  </div>

  <!-- Settings modal -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label for="gemini-key">Gemini API Key</label>
          <div class="input-row">
            <input type="password" id="gemini-key" placeholder="Paste your API key">
            <button id="toggle-key-vis" class="icon-btn" aria-label="Toggle visibility">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
          <a href="https://aistudio.google.com/app/apikey" target="_blank" class="help-link">How to get a free API key</a>
        </div>
        <div class="setting-group">
          <label for="groq-key">Groq API Key (fallback)</label>
          <div class="input-row">
            <input type="password" id="groq-key" placeholder="Paste your API key">
            <button id="toggle-groq-vis" class="icon-btn" aria-label="Toggle visibility">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
          <a href="https://console.groq.com/keys" target="_blank" class="help-link">Get a free Groq key</a>
        </div>
        <div class="setting-group">
          <label for="reminder-time">Daily Reminder Time</label>
          <input type="time" id="reminder-time" value="20:00">
          <button id="enable-notifications" class="btn btn-sm">Enable Notifications</button>
        </div>
        <div class="setting-group">
          <label>Theme</label>
          <div class="theme-toggle">
            <button class="theme-btn active" data-theme="cream">Light</button>
            <button class="theme-btn" data-theme="dark">Dark</button>
          </div>
        </div>
        <div class="setting-group">
          <label>Data</label>
          <div class="btn-row">
            <button id="export-data" class="btn btn-sm">Export Backup</button>
            <button id="import-data" class="btn btn-sm">Import Backup</button>
          </div>
          <input type="file" id="import-file" accept=".json" class="hidden">
        </div>
        <div class="setting-group">
          <button id="sign-out" class="btn btn-sm">Sign Out</button>
        </div>
        <div class="setting-group">
          <button id="reset-app" class="btn btn-sm btn-danger">Reset App</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Book modal -->
  <div id="add-book-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content modal-large">
      <div class="modal-header">
        <h2>Add Book</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="add-book-tabs">
          <button class="add-tab active" data-add-tab="lessons">I have lessons ready</button>
          <button class="add-tab" data-add-tab="quote">Quick add (just a quote)</button>
        </div>

        <div id="add-lessons-form" class="add-tab-content">
          <div class="form-group">
            <label for="new-book-title">Title</label>
            <input type="text" id="new-book-title" placeholder="Book title">
          </div>
          <div class="form-group">
            <label for="new-book-author">Author</label>
            <input type="text" id="new-book-author" placeholder="Author name">
          </div>
          <div class="form-group">
            <label for="new-book-pages">Total Pages (optional)</label>
            <input type="number" id="new-book-pages" placeholder="e.g., 320">
          </div>
          <div class="instructions-box">
            <p>1. Fill in title & author above.</p>
            <p>2. Tap "Copy prompt for Claude" below.</p>
            <p>3. Paste it into <a href="https://claude.ai" target="_blank">claude.ai</a>.</p>
            <p>4. Copy Claude's response and paste it below.</p>
            <p>5. Tap Save.</p>
          </div>
          <button id="copy-claude-prompt" class="btn btn-secondary">Copy prompt for Claude</button>
          <div class="form-group">
            <label for="lessons-json">Paste lessons (JSON format)</label>
            <textarea id="lessons-json" rows="8" placeholder='[{"title": "...", "body": "...", "page": 1, "tags": []}]'></textarea>
          </div>
          <div id="json-error" class="error-msg hidden"></div>
          <button id="save-book-lessons" class="btn btn-primary">Save Book</button>
        </div>

        <div id="add-quote-form" class="add-tab-content hidden">
          <div class="form-group">
            <label for="quick-quote">Quote</label>
            <textarea id="quick-quote" rows="4" placeholder="Enter the quote..."></textarea>
          </div>
          <div class="form-group">
            <label for="quick-author">Author</label>
            <input type="text" id="quick-author" placeholder="Author name">
          </div>
          <div class="form-group">
            <label for="quick-book">Book</label>
            <input type="text" id="quick-book" placeholder="Book title">
          </div>
          <button id="save-quick-quote" class="btn btn-primary">Save Quote</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Book Hub modal -->
  <div id="book-hub-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content modal-large modal-full">
      <div class="modal-header">
        <button class="modal-back">&larr;</button>
        <h2 id="hub-book-title"></h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="book-hub-content"></div>
    </div>
  </div>

  <!-- Connections archive modal -->
  <div id="connections-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content modal-large">
      <div class="modal-header">
        <h2>Connections</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="connections-list"></div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/covers.js"></script>
  <script src="js/llm.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js" type="module"></script>
  <script src="js/app.js"></script>
</body>
</html>
